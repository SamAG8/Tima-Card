steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - '$_IMAGE_NAME'
    - '--build-arg'
    - 'VITE_SUPABASE_URL=$_VITE_SUPABASE_URL'
    - '--build-arg'
    - 'VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY'
    - '--build-arg'
    - 'VITE_API_BASE_URL=$_VITE_API_BASE_URL'
    - '.'
images:
- '$_IMAGE_NAME'
options:
  machineType: 'E2_HIGHCPU_8'
